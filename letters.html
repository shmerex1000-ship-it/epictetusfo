<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letters Archive — Epictetus FO</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ivory:#fbf7ef; --ivory-2:#f6efe3; --paper:#fffdf8;
      --text:#201c17; --ink-2:#2a241d; --muted:#706657;
      --gold:#9f8050; --gold-2:#c9ab6d; --accent:#c0392b;
      --line:rgba(32,28,23,0.12); --line-2:rgba(32,28,23,0.08);
      --display:"Libre Caslon Text",Georgia,serif; --serif:"Source Serif 4",Georgia,serif;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --gutter:clamp(20px,4vw,40px); --maxw:1100px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; color:var(--text); font-family:var(--serif); font-weight:400; line-height:1.6;
      background:
        radial-gradient(circle at 12% -4%, rgba(201,171,109,0.16), transparent 42%),
        linear-gradient(180deg, var(--ivory) 0%, var(--paper) 46%, var(--ivory-2) 100%);
      background-attachment:fixed; -webkit-font-smoothing:antialiased;
    }
    a { color:inherit; }
    .wrap { width:min(var(--maxw), calc(100% - 2*var(--gutter))); margin-inline:auto; }

    .topbar {
      position:sticky; top:0; z-index:10;
      background:rgba(251,247,239,0.85); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line-2);
    }
    .topbar .wrap { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:14px 0; }
    .home-link {
      font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.14em;
      text-transform:uppercase; color:var(--gold); text-decoration:none;
    }
    .home-link:hover { color:var(--text); }
    .crumb { font-family:var(--sans); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }

    .head { padding:clamp(40px,6vw,72px) 0 8px; }
    .head .eyebrow {
      font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:0.2em;
      text-transform:uppercase; color:var(--gold); margin-bottom:16px;
    }
    .head h1 {
      margin:0; font-family:var(--display); font-weight:700; letter-spacing:-0.02em;
      line-height:1.05; font-size:clamp(34px,5vw,60px);
    }
    .head .sub { margin:14px 0 0; color:var(--muted); max-width:60ch; }

    .month-head {
      margin:clamp(40px,5vw,64px) 0 18px; padding-bottom:10px;
      border-bottom:1px solid var(--line);
      font-family:var(--display); font-weight:700; letter-spacing:-0.015em;
      font-size:clamp(22px,3vw,30px);
    }

    .doc { margin:0 0 clamp(26px,4vw,44px); }
    .doc-cap {
      display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;
      margin-bottom:12px;
    }
    .doc-title {
      font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--ink-2);
    }
    .doc-open {
      font-family:var(--sans); font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
      color:var(--gold); text-decoration:none; white-space:nowrap;
    }
    .doc-open:hover { text-decoration:underline; }

    .doc-frame {
      width:100%; border:1px solid var(--line-2); border-radius:18px; background:var(--paper);
      min-height:480px; display:block; box-shadow:0 10px 30px rgba(32,28,23,0.05);
    }
    .doc-pdf {
      width:100%; height:min(86vh,920px); border:1px solid var(--line-2); border-radius:18px;
      background:var(--paper); box-shadow:0 10px 30px rgba(32,28,23,0.05);
    }
    .doc-fallback { font-family:var(--sans); font-size:14px; padding:24px; color:var(--muted); }
    .doc-fallback a { color:var(--accent); }

    .empty {
      margin:60px 0; padding:32px; border:1px dashed var(--line); border-radius:18px;
      font-family:var(--sans); color:var(--muted); text-align:center;
    }

    footer { padding:48px 0 64px; text-align:center; color:var(--muted); font-family:var(--sans); font-size:13px; }
    a:focus-visible, .home-link:focus-visible, .doc-open:focus-visible {
      outline:2px solid var(--gold); outline-offset:3px; border-radius:6px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <a class="home-link" href="index.html">&larr; Epictetus FO</a>
      <span class="crumb" id="crumb">Letters Archive</span>
    </div>
  </div>

  <header class="head wrap">
    <div class="eyebrow">Letters Archive</div>
    <h1 id="title">Letters</h1>
    <p class="sub" id="sub"></p>
  </header>

  <main class="wrap" id="stream"></main>

  <footer>Epictetus FO — letters and reports, in chronological order.</footer>

  <script>
  (function(){
    // Manifest mirrors the homepage archive. Order here defines reading order.
    var ARCHIVE = {
      year: "2026",
      months: [
        { key:"2026-01", label:"January 2026", items:[
          {label:"TWR January 2026", href:"TWR_January_2026.pdf", type:"pdf"}
        ]},
        { key:"2026-02", label:"February 2026", items:[
          {label:"TWR February 2026", href:"TWR_February_2026.pdf", type:"pdf"}
        ]},
        { key:"2026-03", label:"March 2026", items:[
          {label:"TWR March 2026", href:"TWR_March_2026.pdf", type:"pdf"}
        ]},
        { key:"2026-04", label:"April 2026", items:[
          {label:"Letter \u21161 | April 2026", href:"letter-april-2026.html", type:"html"},
          {label:"TWR April 2026", href:"TWR_April_2026.pdf", type:"pdf"},
          {label:"January\u2013April TWR 2026", href:"January-April_TWR_2026_.pdf", type:"pdf"}
        ]},
        { key:"2026-05", label:"May 2026", items:[
          {label:"Message \u21162 | May 2026", href:"letter-may-2026.html", type:"html"},
          {label:"TWR Stoic Core May 2026", href:"TWR_Stoic_Core_May_2026.pdf", type:"pdf"},
          {label:"TWR Tudor Hedge Fund May 2026", href:"TWR_Tudor_Hedge_Fund_May_2026.pdf", type:"pdf"},
          {label:"TWR Tudor Hedge Fund Chart January 2026 - June 2026", href:"TWR_Tudor_Hedge_Fund_Chart_Jan_Jun_2026.html", type:"html"}
        ]}
      ]
    };

    var scope = new URLSearchParams(location.search).get('scope') || ARCHIVE.year;
    var stream = document.getElementById('stream');
    var isYear = (scope === ARCHIVE.year);

    var groups;
    if (isYear) {
      groups = ARCHIVE.months;
      document.getElementById('title').textContent = "Letters Archive — " + ARCHIVE.year;
      document.getElementById('sub').textContent = "Every letter and report for " + ARCHIVE.year + ", in chronological order.";
      document.getElementById('crumb').textContent = ARCHIVE.year;
    } else {
      groups = ARCHIVE.months.filter(function(m){ return m.key === scope; });
      if (groups.length) {
        document.getElementById('title').textContent = groups[0].label;
        document.getElementById('sub').textContent = "All letters and reports for " + groups[0].label + ", in order.";
        document.getElementById('crumb').textContent = groups[0].label;
      }
    }

    function captionEl(item){
      var cap = document.createElement('div'); cap.className = 'doc-cap';
      var t = document.createElement('span'); t.className = 'doc-title'; t.textContent = item.label;
      var o = document.createElement('a'); o.className = 'doc-open'; o.href = item.href;
      o.target = '_blank'; o.rel = 'noopener'; o.textContent = 'Open original \u2197';
      cap.appendChild(t); cap.appendChild(o);
      return cap;
    }

    function mountHtml(item){
      var d = document.createElement('section'); d.className = 'doc';
      d.appendChild(captionEl(item));
      var f = document.createElement('iframe');
      f.className = 'doc-frame'; f.src = item.href; f.loading = 'lazy';
      f.setAttribute('title', item.label);
      f.addEventListener('load', function(){
        try {
          var doc = f.contentDocument || f.contentWindow.document;
          var h = doc.documentElement.scrollHeight;
          if (h && h > 60) f.style.height = h + 'px';
        } catch(e) { /* cross-origin or unavailable: keep min-height */ }
      });
      d.appendChild(f);
      return d;
    }

    function mountPdf(item){
      var d = document.createElement('section'); d.className = 'doc';
      d.appendChild(captionEl(item));
      var obj = document.createElement('object');
      obj.className = 'doc-pdf'; obj.data = item.href; obj.type = 'application/pdf';
      var fb = document.createElement('div'); fb.className = 'doc-fallback';
      fb.innerHTML = 'If this document does not display, <a href="' + item.href + '" target="_blank" rel="noopener">open it in a new tab</a>.';
      obj.appendChild(fb);
      d.appendChild(obj);
      return d;
    }

    var total = 0;
    groups.forEach(function(m){
      if (isYear) {
        var mh = document.createElement('h2'); mh.className = 'month-head'; mh.textContent = m.label;
        stream.appendChild(mh);
      }
      m.items.forEach(function(item){
        total++;
        stream.appendChild(item.type === 'pdf' ? mountPdf(item) : mountHtml(item));
      });
    });

    if (!total) {
      var e = document.createElement('div'); e.className = 'empty';
      e.textContent = 'No letters found for this period.';
      stream.appendChild(e);
    }
  })();
  </script>
</body>
</html>
